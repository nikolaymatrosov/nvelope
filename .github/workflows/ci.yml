name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (build · test · lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Architecture (inward dependency rule)
        run: |
          go install github.com/roblaszczak/go-cleanarch@latest
          export PATH="$PATH:$(go env GOPATH)/bin"
          make lint-arch

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      # Storybook stories run as browser tests under `pnpm test` via the
      # Vitest browser project; Chromium must be present.
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: i18n types drift check
        run: pnpm i18n:types && git diff --exit-code src/i18n/resources.d.ts src/i18n/i18next.d.ts

      # Hard gate: the embedded verification email artifacts must match the
      # react-email templates they are rendered from.
      - name: Email templates drift check
        run: pnpm emails:build && git diff --exit-code ../internal/auth/adapters/emails

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      # Hard gate: every feature area is migrated to t(); a new hardcoded
      # UI string (or an en/ru key-parity gap) fails the build.
      - name: i18n key lint
        run: pnpm i18n:lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # Smoke gate: a broken story or Storybook config fails the build even if
      # the story tests happened to pass.
      - name: Build Storybook
        run: pnpm build-storybook
