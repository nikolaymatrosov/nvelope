name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (build · test · lint · migrate)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: nvelope
          POSTGRES_PASSWORD: nvelope
          POSTGRES_DB: nvelope
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nvelope -d nvelope"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NVELOPE_DATABASE_URL: postgres://nvelope:nvelope@localhost:5432/nvelope?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Migrate (baseline applies cleanly)
        run: go run ./cmd/migrate up

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  frontend:
    name: Frontend (lint · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
