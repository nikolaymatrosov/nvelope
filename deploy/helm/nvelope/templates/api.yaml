apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: nvelope
    component: api
spec:
  replicas: {{ .Values.services.api.replicas }}
  selector:
    matchLabels:
      app: nvelope
      component: api
  template:
    metadata:
      labels:
        app: nvelope
        component: api
    spec:
      containers:
        - name: api
          image: "{{ with .Values.image.registry }}{{ . }}/{{ end }}nvelope-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.api.port }}
          env:
            - name: NVELOPE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseSecret.name }}
                  key: {{ .Values.databaseSecret.key }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.services.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.services.api.port }}
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: nvelope
    component: api
spec:
  selector:
    app: nvelope
    component: api
  ports:
    - port: 80
      targetPort: {{ .Values.services.api.port }}
