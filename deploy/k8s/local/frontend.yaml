# The TanStack Start / Nitro frontend server. The browser calls /api and
# /t/{slug}/api as relative paths, so it is reached through the gateway, which
# routes those paths to the API and everything else here.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvelope-frontend
  labels:
    app: nvelope
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvelope
      component: frontend
  template:
    metadata:
      labels:
        app: nvelope
        component: frontend
    spec:
      containers:
        - name: frontend
          image: nvelope-frontend:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nvelope-frontend
  labels:
    app: nvelope
    component: frontend
spec:
  selector:
    app: nvelope
    component: frontend
  ports:
    - port: 80
      targetPort: 3000
