# Postgres and Redis for local evaluation only. Storage is ephemeral
# (emptyDir) — deleting the pod drops all data. Not for any real environment.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvelope-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvelope
      component: postgres
  template:
    metadata:
      labels:
        app: nvelope
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17
          env:
            - name: POSTGRES_USER
              value: nvelope
            - name: POSTGRES_PASSWORD
              value: nvelope
            - name: POSTGRES_DB
              value: nvelope
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "nvelope", "-d", "nvelope"]
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nvelope-postgres
spec:
  selector:
    app: nvelope
    component: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvelope-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvelope
      component: redis
  template:
    metadata:
      labels:
        app: nvelope
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nvelope-redis
spec:
  selector:
    app: nvelope
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
