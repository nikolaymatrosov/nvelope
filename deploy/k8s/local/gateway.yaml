# Single-origin TLS gateway. The session cookie is Secure + SameSite=Lax, so
# the browser must reach the frontend and the API on one HTTPS origin. nginx
# terminates TLS for nvelope.local, routes API paths to the API service and
# everything else to the frontend, and redirects plain HTTP to HTTPS.
#
# The nvelope-tls secret is created out of band — run tls-setup.sh first.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvelope-gateway-conf
data:
  nginx.conf: |
    events {}
    http {
      server {
        listen 80;
        server_name nvelope.local;
        return 301 https://$host$request_uri;
      }
      server {
        listen 443 ssl;
        server_name nvelope.local;

        ssl_certificate     /etc/nginx/tls/tls.crt;
        ssl_certificate_key /etc/nginx/tls/tls.key;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_upgrade;

        location = /healthz {
          proxy_pass http://nvelope-api:80;
        }
        location /api/ {
          proxy_pass http://nvelope-api:80;
        }
        location ~ ^/t/[^/]+/api {
          proxy_pass http://nvelope-api:80;
        }
        location / {
          proxy_pass http://nvelope-frontend:80;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvelope-gateway
  labels:
    app: nvelope
    component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvelope
      component: gateway
  template:
    metadata:
      labels:
        app: nvelope
        component: gateway
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: tls
              mountPath: /etc/nginx/tls
              readOnly: true
      volumes:
        - name: conf
          configMap:
            name: nvelope-gateway-conf
        - name: tls
          secret:
            secretName: nvelope-tls
---
apiVersion: v1
kind: Service
metadata:
  name: nvelope-gateway
  labels:
    app: nvelope
    component: gateway
spec:
  type: LoadBalancer
  selector:
    app: nvelope
    component: gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443
