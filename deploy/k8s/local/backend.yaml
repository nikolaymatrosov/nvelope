# The four Go services. Each waits for Postgres and Redis before starting; if a
# pod starts before the migrate job finishes it may restart once or twice until
# the schema exists, which is expected on a cold deploy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvelope-api
  labels:
    app: nvelope
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvelope
      component: api
  template:
    metadata:
      labels:
        app: nvelope
        component: api
    spec:
      initContainers:
        - name: wait-for-datastores
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z nvelope-postgres 5432 && nc -z nvelope-redis 6379; do echo waiting; sleep 2; done"
      containers:
        - name: api
          image: nvelope-api:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: nvelope-config
            - secretRef:
                name: nvelope-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nvelope-api
  labels:
    app: nvelope
    component: api
spec:
  selector:
    app: nvelope
    component: api
  ports:
    - port: 80
      targetPort: 8080
---
