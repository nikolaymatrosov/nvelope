---
# The consumer reads the Yandex Data Streams feedback topic. With placeholder
# stream config it cannot connect and will stay in CrashLoopBackOff — that is
# expected for local evaluation. Scale it to 0 if the noise is distracting:
#   kubectl -n nvelope scale deploy/nvelope-consumer --replicas=0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvelope-consumer
  labels:
    app: nvelope
    component: consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvelope
      component: consumer
  template:
    metadata:
      labels:
        app: nvelope
        component: consumer
    spec:
      initContainers:
        - name: wait-for-datastores
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z nvelope-postgres 5432 && nc -z nvelope-redis 6379; do echo waiting; sleep 2; done"
      containers:
        - name: consumer
          image: nvelope-consumer:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: nvelope-config
            - secretRef:
                name: nvelope-secrets
