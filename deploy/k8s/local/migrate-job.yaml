# Runs the embedded database migrations before the services start. The job is
# idempotent — re-running it on an up-to-date database is a no-op.
apiVersion: batch/v1
kind: Job
metadata:
  name: nvelope-migrate
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app: nvelope
        component: migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z nvelope-postgres 5432; do echo waiting for postgres; sleep 2; done"
      containers:
        - name: migrate
          image: nvelope-migrate:dev
          imagePullPolicy: IfNotPresent
          args: ["up"]
          envFrom:
            - configMapRef:
                name: nvelope-config
            - secretRef:
                name: nvelope-secrets
