# Base API deployment. A minimal, schedulable starting point — not
# production-hardened (no autoscaling, resource tuning, or network policy;
# those arrive in a later phase).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nvelope-api
  labels:
    app: nvelope
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nvelope
      component: api
  template:
    metadata:
      labels:
        app: nvelope
        component: api
    spec:
      containers:
        - name: api
          image: nvelope-api:dev
          ports:
            - containerPort: 8080
          env:
            - name: NVELOPE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: nvelope-secrets
                  key: database-url
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nvelope-api
  labels:
    app: nvelope
    component: api
spec:
  selector:
    app: nvelope
    component: api
  ports:
    - port: 80
      targetPort: 8080
